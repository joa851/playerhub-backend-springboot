spring.application.name=comments
server.port=${PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/playerhub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Postgres en la VM tiene max_connections=20 (ajustado para e2-micro).
# Limito el pool para que player + comments + reservas internas quepan.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

spring.cloud.config.enabled=${SPRING_CLOUD_CONFIG_ENABLED:false}

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}

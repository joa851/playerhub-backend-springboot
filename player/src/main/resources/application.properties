spring.application.name=player
server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/playerhub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Postgres en la VM tiene max_connections=20 (ajustado para e2-micro).
# Limito el pool para que player + comments + reservas internas quepan.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

api.football.base-url=${API_FOOTBALL_BASE_URL:https://v3.football.api-sports.io/players/profiles}
api.football.key=${API_FOOTBALL_KEY:}

# URL del microservicio comments (Feign). En local: http://localhost:8082.
# En Cloud Run la inyecta el workflow vía COMMENTS_SERVICE_URL.
comments.service.url=${COMMENTS_SERVICE_URL:http://localhost:8082}

# LLM (Google Gemini) para generar el "Equipo Ideal".
# La key se inyecta en producción desde Secret Manager (playerhub-llm-key).
llm.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
llm.model=${LLM_MODEL:gemini-2.0-flash-001}
llm.key=${LLM_KEY:}

# Config Server: el "optional:" significa que si el server no está disponible
# el servicio arranca igual (útil en local sin Config Server).
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Eureka: registramos al microservicio. En local se desactiva con env var.
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.serviceUrl.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

# Welcome message. Default si no llega del Config Server.
app.welcome-message=${APP_WELCOME_MESSAGE:Welcome to player (default)}

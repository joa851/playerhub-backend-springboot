spring.application.name=player-test

spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.cloud.config.enabled=false
eureka.client.enabled=false

api.football.base-url=http://localhost/fake
api.football.key=test-key

comments.service.url=http://localhost:8082

llm.base-url=http://localhost/fake-llm
llm.model=test-model
llm.key=test-key

app.welcome-message=test-welcome
